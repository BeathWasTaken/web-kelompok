function tagLabel(t){const m={wn:"Wawasan Nusantara",dig:"Media Digital",pkn:"PKn & Kebangsaan",nas:"Nasionalisme",lit:"Literasi Digital"};return m[t]||t}
function tagClass(t){return"tag tag-"+t}

function render(list){
  const g=document.getElementById('grid');
  g.innerHTML='';
  list.forEach(j=>{
    const tagHtml=j.tags.map(t=>`<span class="${tagClass(t)}">${tagLabel(t)}</span>`).join('');
    g.innerHTML+=`<div class="card" data-tags="${j.tags.join(',')}">
      <div class="card-top">
        <span class="num">${j.n}</span>
        <span class="title">${j.title}</span>
      </div>
      <div class="meta">${j.authors} · ${j.journal} · ${j.year} · ${j.vol}</div>
      <div class="tags">${tagHtml}</div>
      <div class="link-row">
        <a href="${j.url}" target="_blank" class="link-btn primary"><i class="ti ti-external-link" aria-hidden="true"></i> Buka Jurnal</a>
        <span class="sinta">${j.sinta}</span>
      </div>
    </div>`;
  });
}

function filter(tag,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const filtered=tag==='all'?journals:journals.filter(j=>j.tags.includes(tag));
  render(filtered);
}

render(journals);
</script>
