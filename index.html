<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transformasi Wawasan Nusantara — Digital Nationalism Gen Z</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d17;--bg2:#11142a;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);
  --text:#e9ecf5;--muted:#9aa0b8;--accent:#7c5cff;--accent2:#22d3ee;--accent3:#f472b6;
  --shadow:0 10px 40px rgba(0,0,0,.45);
  --radius:16px;--radius-sm:10px;
  --font:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
}
[data-theme="light"]{
  --bg:#f5f6fb;--bg2:#eaecf6;--surface:#ffffff;--surface2:#f8f9fd;
  --border:rgba(20,23,40,.08);--border2:rgba(20,23,40,.18);
  --text:#1a1d2e;--muted:#5a6079;--shadow:0 10px 30px rgba(20,23,40,.08);
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(1200px 600px at 10% -10%,rgba(124,92,255,.18),transparent 60%),radial-gradient(900px 500px at 100% 0%,rgba(34,211,238,.12),transparent 60%),var(--bg);background-attachment:fixed}
a{color:inherit;text-decoration:none}
.wrap{max-width:980px;margin:0 auto;padding:28px 20px 80px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;letter-spacing:.2px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px var(--accent)}
.iconbtn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:.2s}
.iconbtn:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-1px)}
.hero{position:relative;padding:36px 28px;border-radius:24px;background:linear-gradient(135deg,rgba(124,92,255,.18),rgba(34,211,238,.10) 50%,rgba(244,114,182,.12));border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.hero::before{content:"";position:absolute;inset:-40%;background:conic-gradient(from 90deg at 50% 50%,transparent,rgba(124,92,255,.18),transparent 30%);animation:spin 18s linear infinite;opacity:.55;z-index:0}
@keyframes spin{to{transform:rotate(360deg)}}
.hero>*{position:relative;z-index:1}
.avatar{width:74px;height:74px;border-radius:22px;background:linear-gradient(135deg,#7c5cff,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:30px;color:white;box-shadow:0 14px 40px rgba(124,92,255,.45);margin-bottom:14px}
.hero h1{font-size:clamp(22px,4vw,32px);font-weight:700;line-height:1.2;letter-spacing:-.02em;margin-bottom:10px}
.hero h1 .grad{background:linear-gradient(90deg,#a78bfa,#22d3ee 60%,#f472b6);-webkit-background-clip:text;background-clip:text;color:transparent}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.badge{font-size:11.5px;padding:5px 11px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--text);display:inline-flex;align-items:center;gap:6px}
.badge.q1{background:linear-gradient(135deg,rgba(124,92,255,.25),rgba(34,211,238,.18));border-color:transparent;color:#fff}
.section{margin-top:22px}
.section h2{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h2::before{content:"";width:4px;height:14px;border-radius:3px;background:linear-gradient(var(--accent),var(--accent2))}
.nov{padding:16px 18px;border-radius:16px;background:var(--surface);border:1px solid var(--border);transition:.2s}
.nov:hover{transform:translateY(-2px);border-color:var(--border2);background:var(--surface2)}
.nov .ico{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:linear-gradient(135deg,rgba(124,92,255,.25),rgba(34,211,238,.2));margin-bottom:10px}
.nov h3{font-size:13.5px;font-weight:600;margin-bottom:6px}
.nov p{font-size:12.5px;color:var(--muted);line-height:1.55}
.controls{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.search{position:relative}
.search input{width:100%;padding:12px 14px 12px 40px;border-radius:12px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13.5px;font-family:inherit;outline:none;transition:.2s}
.search input::placeholder{color:var(--muted)}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.15)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:.15s;font-family:inherit}
.fbtn:hover{color:var(--text);border-color:var(--border2)}
.fbtn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;font-weight:500}
.stats{font-size:12px;color:var(--muted);margin:8px 2px 4px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;position:relative;transition:.2s;animation:fadein .4s ease both;display:flex;flex-direction:column}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:auto}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-2px);box-shadow:var(--shadow)}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.num{flex-shrink:0;width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,rgba(124,92,255,.2),rgba(34,211,238,.18));color:var(--text);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600}
.title{font-size:14px;font-weight:600;line-height:1.45;letter-spacing:-.005em}
.meta{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.55}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:10.5px;padding:3px 9px;border-radius:999px;font-weight:500;letter-spacing:.02em}
.tag-wn{background:rgba(34,211,238,.14);color:#67e8f9;border:1px solid rgba(34,211,238,.25)}
.tag-dig{background:rgba(124,92,255,.16);color:#c4b5fd;border:1px solid rgba(124,92,255,.3)}
.tag-ai{background:rgba(244,114,182,.14);color:#fda4af;border:1px solid rgba(244,114,182,.3)}
.tag-genz{background:rgba(250,204,21,.12);color:#fde68a;border:1px solid rgba(250,204,21,.25)}
.tag-nas{background:rgba(74,222,128,.13);color:#86efac;border:1px solid rgba(74,222,128,.25)}
.tag-lit{background:rgba(251,146,60,.13);color:#fdba74;border:1px solid rgba(251,146,60,.25)}
[data-theme="light"] .tag-wn{color:#0e7490}
[data-theme="light"] .tag-dig{color:#5b21b6}
[data-theme="light"] .tag-ai{color:#9d174d}
[data-theme="light"] .tag-genz{color:#854d0e}
[data-theme="light"] .tag-nas{color:#166534}
[data-theme="light"] .tag-lit{color:#9a3412}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{font-size:12.5px;padding:7px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:.15s;font-weight:500}
.btn:hover{transform:translateY(-1px);border-color:var(--accent);background:var(--surface)}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.btn.primary:hover{filter:brightness(1.1);box-shadow:0 8px 24px rgba(124,92,255,.35)}
.btn.dl{background:rgba(74,222,128,.14);border-color:rgba(74,222,128,.3);color:#86efac}
[data-theme="light"] .btn.dl{color:#166534}
.btn.dl:hover{background:rgba(74,222,128,.22);border-color:rgba(74,222,128,.5)}
/* SINTA button */
.btn.sinta-btn{background:rgba(251,146,60,.14);border-color:rgba(251,146,60,.32);color:#fdba74}
[data-theme="light"] .btn.sinta-btn{color:#9a3412}
.btn.sinta-btn:hover{background:rgba(251,146,60,.24);border-color:rgba(251,146,60,.52);transform:translateY(-1px)}
.btn svg{width:14px;height:14px}
.sinta{font-size:11px;font-weight:600;letter-spacing:.04em;margin-left:auto;padding:3px 9px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.sinta.s1{background:rgba(124,92,255,.2);color:#c4b5fd;border-color:rgba(124,92,255,.35)}
.sinta.s2{background:rgba(34,211,238,.18);color:#67e8f9;border-color:rgba(34,211,238,.32)}
.sinta.s3{background:rgba(74,222,128,.16);color:#86efac;border-color:rgba(74,222,128,.3)}
.sinta.s4{background:rgba(250,204,21,.18);color:#fde68a;border-color:rgba(250,204,21,.32)}
.sinta.s5{background:rgba(251,146,60,.18);color:#fdba74;border-color:rgba(251,146,60,.32)}
[data-theme="light"] .sinta.s1{color:#5b21b6}
[data-theme="light"] .sinta.s2{color:#0e7490}
[data-theme="light"] .sinta.s3{color:#166534}
[data-theme="light"] .sinta.s4{color:#854d0e}
[data-theme="light"] .sinta.s5{color:#9a3412}
.foot{margin-top:32px;padding-top:18px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--muted)}
.foot strong{color:var(--text)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.hidden{display:none!important}
@media(max-width:600px){
  .wrap{padding:18px 14px 60px}
  .hero{padding:26px 20px}
  .card{padding:14px 16px}
}
</style>
</head>

<script>
(function(){
  const journals = window.__journals;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');
  const searchInput = document.getElementById('searchInput');
  const filterBar = document.getElementById('filterBar');
  const themeBtn = document.getElementById('themeBtn');

  const tagLabels = {wn:"Wawasan Nusantara",dig:"Digital Nationalism",ai:"AI & Algorithm",genz:"Generasi Z",nas:"Nasionalisme",lit:"Literasi Digital",pkn:"PKn"};
  const sintaClass = s => {
    const m = String(s).toLowerCase();
    if(m.startsWith("s")) return "sinta " + m;
    return "sinta";
  };

  let activeTag = "all";
  let activeSinta = "all";
  let query = "";

  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);}
  function googleSearch(j){return "https://www.google.com/search?q="+encodeURIComponent(j.title+' '+j.journal+' filetype:pdf');}
  function sintaSearch(j){return "https://sinta.kemdikbud.go.id/journals?q="+encodeURIComponent(j.journal)+"&search=1";}

  function cardHtml(j){
    const openLink = j.url;
    const pdfLink = j.pdf;
    const sintaLink = j.sinta_url;
    return `<article class="card">
      <div class="card-top"><div class="num">${j.n}</div><div class="title">${escapeHtml(j.title)}</div></div>
      <div class="meta">${escapeHtml(j.authors)}</div>
      <div class="actions">
        <a href="${openLink}" target="_blank" rel="noopener" class="btn primary" title="Buka halaman jurnal di OJS"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Buka Jurnal</a>
        <a href="${pdfLink}" target="_blank" rel="noopener" class="btn dl" title="Download PDF jurnal"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download PDF</a>
      </div>
      <div class="actions" style="justify-content:center;margin-top:8px">
        <a href="${sintaLink}" target="_blank" rel="noopener" class="btn sinta-btn" title="Cek jurnal di SINTA Kemdikbud"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>Buka SINTA</a>
      </div>
    </article>`;
  }

  function render(){
    const q = query.trim().toLowerCase();
    const filtered = journals.filter(j=>{
      const text = (j.title+" "+j.authors).toLowerCase();
      return !q || text.includes(q);
    });
    grid.innerHTML = filtered.map(cardHtml).join("");
    empty.classList.toggle("hidden", filtered.length>0);
    stats.textContent = `Menampilkan ${filtered.length} dari ${journals.length} jurnal`;
  }

  filterBar.addEventListener("click",e=>{
    const b = e.target.closest(".fbtn"); if(!b) return;
    filterBar.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    activeTag = b.dataset.tag;
    render();
  });

  let t; searchInput.addEventListener("input",e=>{clearTimeout(t);t=setTimeout(()=>{query=e.target.value;render();},120);});

  // theme
  const saved = localStorage.getItem("theme");
  if(saved==="light") document.documentElement.setAttribute("data-theme","light");
  themeBtn.addEventListener("click",()=>{
    const cur = document.documentElement.getAttribute("data-theme");
    if(cur==="light"){document.documentElement.removeAttribute("data-theme");localStorage.setItem("theme","dark");}
    else{document.documentElement.setAttribute("data-theme","light");localStorage.setItem("theme","light");}
  });

  render();
})();
</script>
</div>
